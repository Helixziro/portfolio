<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vishnu Kumar Sharma — AI Engineer & Creative Technologist</title>
<meta name="description" content="Portfolio of Vishnu Kumar Sharma — AI Engineer, Full Stack Developer, Healthcare AI Researcher" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ================================================
   THEME PRESETS — edit or add your own here
   ================================================ */
:root {
  /* ── THEME: Cosmic Gold (default) ─────────────── */
  --bg:          #04060F;
  --deep:        #070A18;
  --surface:     rgba(255,255,255,0.046);
  --surface2:    rgba(255,255,255,0.025);
  --border:      rgba(255,255,255,0.09);
  --border-h:    rgba(232,176,75,0.45);

  --gold:        #E8B04B;
  --gold-lt:     #F5CB7A;
  --gold-dim:    rgba(232,176,75,0.13);

  /* ── PRIMARY accent (most prominent color) ─────── */
  --accent1:     #E8B04B;
  --accent1-lt:  #F5CB7A;
  --accent1-dim: rgba(232,176,75,0.13);
  --accent1-glow:0 0 48px rgba(232,176,75,0.22);

  /* ── SECONDARY accent ───────────────────────────── */
  --accent2:     #FF4B6E;
  --accent2-dim: rgba(255,75,110,0.11);
  --accent2-glow:0 0 48px rgba(255,75,110,0.2);

  /* ── TERTIARY accent ────────────────────────────── */
  --accent3:     #0CF2C4;
  --accent3-dim: rgba(12,242,196,0.1);
  --accent3-glow:0 0 48px rgba(12,242,196,0.18);

  /* ── QUATERNARY accent ──────────────────────────── */
  --accent4:     #9B6DFF;
  --accent4-dim: rgba(155,109,255,0.12);
  --accent4-glow:0 0 40px rgba(155,109,255,0.2);

  /* ── TEXT ───────────────────────────────────────── */
  --text:        #F5F0E8;
  --muted:       rgba(245,240,232,0.52);
  --faint:       rgba(245,240,232,0.28);

  /* ── FONTS ──────────────────────────────────────── */
  --display:     'Cormorant Garamond', Georgia, serif;
  --body:        'Outfit', sans-serif;
  --mono:        'Fira Code', monospace;

  /* ── MISC ───────────────────────────────────────── */
  --ease:        cubic-bezier(0.76,0,0.24,1);
  --spring:      cubic-bezier(0.34,1.56,0.64,1);

  /* ── GRADIENT (hero name, stats, card years) ─────── */
  --grad-a:      var(--accent1);
  --grad-b:      var(--accent2);

  /* ── SKILL BAR fill ─────────────────────────────── */
  --bar-a:       var(--accent1);
  --bar-b:       var(--accent2);

  /* ── SCROLL PROGRESS ────────────────────────────── */
  --prog-a:      var(--accent1);
  --prog-b:      var(--accent2);
  --prog-c:      var(--accent3);

  /* ── TIMELINE DOT ───────────────────────────────── */
  --dot-color:   var(--accent1);

  /* ── NAV CTA ────────────────────────────────────── */
  --cta-color:   var(--accent1);
  --cta-hover:   var(--accent1-dim);

  /* ── ORB FILLS (ambient glow blobs) ─────────────── */
  --orb1-color:  232,176,75;
  --orb2-color:  255,75,110;
  --orb3-color:  12,242,196;
}

/* ================================================
   RESET & BASE
   ================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;overflow-x:hidden;transition:background 0.6s,color 0.4s}
::selection{background:rgba(232,176,75,0.28);color:#fff}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent1),var(--accent2));border-radius:10px}

/* ================================================
   SCROLL PROGRESS BAR
   ================================================ */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--prog-a),var(--prog-b),var(--prog-c));z-index:9999;transition:width 0.08s linear;box-shadow:0 0 8px var(--accent1)}

/* ================================================
   NOISE OVERLAY
   ================================================ */
.noise{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.018;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
.particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ================================================
   LOADER
   ================================================ */
.loader{position:fixed;inset:0;background:#020308;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.9s var(--ease)}
.loader.fade-out{opacity:0;pointer-events:none}
.loader-eyebrow{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.45em;color:rgba(232,176,75,0.55);text-transform:uppercase;margin-bottom:40px;animation:loaderPulse 1.6s ease-in-out infinite}
@keyframes loaderPulse{0%,100%{opacity:0.55}50%{opacity:1}}
.loader-name{font-family:var(--display);font-size:clamp(3rem,9vw,6rem);font-weight:700;letter-spacing:-0.02em;color:transparent;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;background-clip:text;margin-bottom:56px;opacity:0;transform:translateY(24px);animation:nameUp 0.9s var(--ease) 0.3s forwards}
@keyframes nameUp{to{opacity:1;transform:translateY(0)}}
.loader-track{width:280px;height:1px;background:rgba(255,255,255,0.08);position:relative;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent2));box-shadow:0 0 12px var(--accent1);transition:width 0.06s linear}
.loader-pct{font-family:var(--mono);font-size:0.62rem;color:var(--faint);margin-top:14px;letter-spacing:0.2em;text-align:right;width:280px}

/* ================================================
   NAVBAR
   ================================================ */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:26px 64px;display:flex;align-items:center;justify-content:space-between;transition:all 0.5s var(--ease)}
.navbar.scrolled{background:rgba(4,6,15,0.88);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);padding:16px 64px;border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--display);font-size:1.35rem;font-weight:700;letter-spacing:0.06em;color:var(--accent1);text-decoration:none;transition:opacity 0.3s}
.nav-logo:hover{opacity:0.75}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-family:var(--mono);font-size:0.63rem;letter-spacing:0.22em;color:var(--muted);text-decoration:none;text-transform:uppercase;position:relative;transition:color 0.3s}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--accent1);transform:scaleX(0);transform-origin:left;transition:transform 0.3s var(--ease)}
.nav-links a:hover{color:var(--accent1)}
.nav-links a:hover::after{transform:scaleX(1)}
.nav-cta{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--cta-color);border:1px solid rgba(232,176,75,0.38);padding:10px 26px;text-decoration:none;transition:all 0.3s;background:transparent;cursor:pointer}
.nav-cta:hover{background:var(--cta-hover);box-shadow:var(--accent1-glow);transform:translateY(-2px)}

/* ================================================
   LAYOUT
   ================================================ */
section{position:relative;z-index:1}
.container{max-width:1280px;margin:0 auto;padding:0 64px}
.section-label{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.4em;color:var(--accent1);text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-label::before{content:'';width:24px;height:1px;background:var(--accent1)}
.section-title{font-family:var(--display);font-size:clamp(2.8rem,6vw,5.5rem);font-weight:700;line-height:1.05;letter-spacing:-0.02em;color:var(--text)}
.gold-text{color:transparent;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));-webkit-background-clip:text;background-clip:text}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(232,176,75,0.2),transparent)}

/* ================================================
   SCROLL REVEAL
   ================================================ */
.reveal{opacity:0;transform:translateY(38px);transition:opacity 0.85s var(--ease),transform 0.85s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-38px);transition:opacity 0.85s var(--ease),transform 0.85s var(--ease)}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(0.93);transition:opacity 0.75s var(--ease),transform 0.75s var(--ease)}
.reveal-scale.visible{opacity:1;transform:scale(1)}
.d1{transition-delay:.08s}.d2{transition-delay:.18s}.d3{transition-delay:.28s}.d4{transition-delay:.38s}.d5{transition-delay:.48s}.d6{transition-delay:.58s}

/* ================================================
   HERO
   ================================================ */
.hero{min-height:100vh;display:flex;align-items:center;padding:120px 64px 80px;position:relative;overflow:hidden}
.glow-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(1px)}
.orb-1{width:700px;height:700px;background:radial-gradient(circle,rgba(var(--orb1-color),0.07),transparent 70%);top:-120px;right:-150px;animation:orbFloat 9s ease-in-out infinite}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(var(--orb2-color),0.06),transparent 70%);bottom:-80px;left:-80px;animation:orbFloat 11s ease-in-out infinite 2s}
.orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(var(--orb3-color),0.05),transparent 70%);top:40%;right:22%;animation:orbFloat 8s ease-in-out infinite 1s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(28px,-18px) scale(1.04)}66%{transform:translate(-14px,22px) scale(0.97)}}
.hero-inner{max-width:900px;position:relative;z-index:2}
.hero-eyebrow{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.5em;color:var(--accent3);text-transform:uppercase;display:flex;align-items:center;gap:16px;margin-bottom:28px;opacity:0;transform:translateY(16px);animation:heroUp 0.8s var(--ease) 0.3s forwards}
.hero-eyebrow::before{content:'';width:36px;height:1px;background:var(--accent3)}
@keyframes heroUp{to{opacity:1;transform:translateY(0)}}
.hero-name{font-family:var(--display);font-size:clamp(3.5rem,10.5vw,9.5rem);font-weight:700;line-height:0.94;letter-spacing:-0.03em;color:var(--text);margin-bottom:28px;opacity:0;transform:translateY(32px);animation:heroUp 1s var(--ease) 0.5s forwards}
.hero-name span{color:transparent;background:linear-gradient(135deg,var(--grad-a) 0%,var(--grad-b) 55%);-webkit-background-clip:text;background-clip:text}
.hero-role-wrap{display:flex;align-items:center;gap:14px;margin-bottom:32px;opacity:0;animation:heroUp 0.8s var(--ease) 0.85s forwards}
.hero-role-prefix{font-family:var(--mono);font-size:0.82rem;color:var(--faint)}
.hero-role{font-family:var(--body);font-size:clamp(1.05rem,2.4vw,1.45rem);font-weight:500;color:var(--accent1);min-width:270px}
.cursor-blink{display:inline-block;width:2px;height:1.05em;background:var(--accent1);margin-left:3px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero-image-wrap{position:absolute;right:-480px;top:30%;transform:translateY(-120%);width:400px;height:600px;border-radius:700px;overflow:hidden;display:flex;align-items:center;justify-content:center;z-index:2}.hero-image{width:300%;height:90%;object-fit:cover}
.hero-desc{max-width:530px;font-size:1rem;font-weight:300;color:var(--muted);line-height:1.9;margin-bottom:48px;opacity:0;animation:heroUp 0.8s var(--ease) 1.05s forwards}
.hero-desc strong{color:var(--text);font-weight:500}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:80px;opacity:0;animation:heroUp 0.8s var(--ease) 1.2s forwards}
.btn-gold{font-family:var(--mono);font-size:0.63rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--bg);background:var(--accent1);padding:16px 40px;border:none;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.35s var(--ease);position:relative;overflow:hidden}
.btn-gold::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2),var(--accent1-lt));opacity:0;transition:opacity 0.3s}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(232,176,75,0.38)}
.btn-gold:hover::after{opacity:1}
.btn-gold span{position:relative;z-index:1}
.btn-outline{font-family:var(--mono);font-size:0.63rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);background:transparent;padding:16px 40px;border:1px solid var(--border);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.35s var(--ease)}
.btn-outline:hover{border-color:var(--accent1);color:var(--accent1);background:var(--accent1-dim);transform:translateY(-3px)}
.hero-stats{display:flex;gap:52px;flex-wrap:wrap;opacity:0;animation:heroUp 0.8s var(--ease) 1.4s forwards}
.stat-num{font-family:var(--display);font-size:2.8rem;font-weight:700;line-height:1;color:transparent;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));-webkit-background-clip:text;background-clip:text}
.stat-lbl{font-family:var(--mono);font-size:0.57rem;letter-spacing:0.22em;color:var(--faint);text-transform:uppercase;margin-top:6px}
.stat-sep{width:1px;align-self:stretch;margin:4px 0;background:linear-gradient(transparent,rgba(255,255,255,0.1),transparent)}
.hero-scroll{position:absolute;bottom:40px;left:64px;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:heroUp 0.7s var(--ease) 1.6s forwards}
.hero-scroll-txt{font-family:var(--mono);font-size:0.53rem;letter-spacing:0.4em;color:var(--faint);text-transform:uppercase}
.hero-scroll-line{width:1px;height:52px;background:linear-gradient(transparent,var(--accent1));animation:scrollLine 2.2s ease-in-out infinite}
@keyframes scrollLine{0%{transform:scaleY(0);transform-origin:top;opacity:1}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom;opacity:0.2}}

/* ================================================
   ABOUT
   ================================================ */
.about{padding:160px 0}
.about-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:88px;align-items:start}
.about-story{font-size:1.02rem;font-weight:300;color:var(--muted);line-height:2;margin-top:28px}
.about-story strong{color:var(--text);font-weight:500}
.about-quote{margin-top:40px;padding:28px 32px;border-left:2px solid var(--accent1);background:linear-gradient(135deg,var(--accent1-dim),transparent);transition:border-color 0.3s,box-shadow 0.3s}
.about-quote:hover{border-color:var(--accent2);box-shadow:var(--accent1-glow)}
.about-quote p{font-family:var(--display);font-size:1.15rem;font-weight:300;font-style:italic;color:var(--text);line-height:1.75}
.about-quote span{color:var(--accent1);font-style:normal;font-weight:600}
.about-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:32px}
.about-tag{font-family:var(--mono);font-size:0.57rem;letter-spacing:0.2em;color:var(--accent3);border:1px solid rgba(12,242,196,0.25);padding:5px 14px;text-transform:uppercase;transition:all 0.3s}
.about-tag:hover{background:var(--accent3-dim);border-color:var(--accent3);transform:translateY(-2px)}
.about-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.about-card{background:var(--surface);border:1px solid var(--border);padding:26px 22px;transition:all 0.45s var(--ease);position:relative;overflow:hidden}
.about-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent1),var(--accent2));transform:scaleX(0);transition:transform 0.45s var(--ease)}
.about-card:hover::before{transform:scaleX(1)}
.about-card:hover{border-color:var(--border-h);transform:translateY(-5px);box-shadow:0 20px 60px rgba(0,0,0,0.45),var(--accent1-glow)}
.card-icon{font-size:2rem;margin-bottom:14px;display:block}
.card-title{font-family:var(--body);font-size:0.84rem;font-weight:600;color:var(--text);margin-bottom:6px}
.card-desc{font-size:0.77rem;color:var(--faint);line-height:1.6}
.card-years{font-family:var(--display);font-size:2rem;font-weight:700;color:transparent;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));-webkit-background-clip:text;background-clip:text;margin-top:14px;line-height:1}
.research-badge{grid-column:1/-1;background:linear-gradient(135deg,var(--accent4-dim),var(--accent1-dim));border:1px solid rgba(155,109,255,0.28);padding:20px 22px;display:flex;align-items:center;gap:16px;transition:all 0.35s}
.research-badge:hover{border-color:rgba(155,109,255,0.5);box-shadow:var(--accent4-glow)}
.badge-icon{font-size:1.4rem;flex-shrink:0}
.badge-txt{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.12em;color:var(--accent4);line-height:1.85}

/* ================================================
   SKILLS
   ================================================ */
.skills{padding:160px 0;position:relative}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:16px;margin-top:64px}
.skill-card{background:var(--surface);border:1px solid var(--border);padding:28px 20px;text-align:center;transition:all 0.45s var(--ease);position:relative;overflow:hidden;cursor:default}
.skill-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent1-dim),transparent);opacity:0;transition:opacity 0.45s}
.skill-card:hover::after{opacity:1}
.skill-card:hover{border-color:var(--border-h);transform:translateY(-7px) scale(1.02);box-shadow:0 24px 64px rgba(0,0,0,0.42),var(--accent1-glow)}
.skill-icon{font-size:2.2rem;margin-bottom:12px;display:block}
.skill-name{font-family:var(--body);font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:14px}
.skill-bar{width:100%;height:2px;background:rgba(255,255,255,0.08);overflow:hidden}
.skill-bar-fill{height:100%;background:linear-gradient(90deg,var(--bar-a),var(--bar-b));box-shadow:0 0 8px var(--accent1);width:0%;transition:width 1.5s var(--ease)}
.skill-pct{font-family:var(--mono);font-size:0.57rem;color:var(--faint);margin-top:7px;text-align:right}

/* ================================================
   PROJECTS
   ================================================ */
.projects{padding:160px 0}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:64px}
.project-card{background:var(--surface);border:1px solid var(--border);transition:all 0.5s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent1),var(--accent2));transform:scaleX(0);transform-origin:left;transition:transform 0.5s var(--ease)}
.project-card:hover::before{transform:scaleX(1)}
.project-card:hover{border-color:var(--border-h);transform:translateY(-9px);box-shadow:0 36px 80px rgba(0,0,0,0.55),var(--accent1-glow)}
.project-card.featured{grid-column:span 2}
.project-hdr{padding:36px 28px 26px;position:relative}
.project-num{position:absolute;top:16px;right:22px;font-family:var(--display);font-size:5rem;font-weight:700;color:rgba(232,176,75,0.07);line-height:1;transition:color 0.4s}
.project-card:hover .project-num{color:rgba(232,176,75,0.13)}
.project-cat{font-family:var(--mono);font-size:0.57rem;letter-spacing:0.3em;color:var(--accent2);text-transform:uppercase;margin-bottom:10px}
.project-title{font-family:var(--display);font-size:1.25rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:14px}
.project-card.featured .project-title{font-size:1.65rem}
.project-desc{font-size:0.82rem;color:var(--muted);line-height:1.82}
.project-ftr{padding:20px 28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.proj-tags{display:flex;flex-wrap:wrap;gap:6px}
.proj-tag{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.1em;color:var(--faint);border:1px solid rgba(255,255,255,0.08);padding:3px 10px;transition:all 0.3s}
.proj-tag:hover{border-color:var(--accent1);color:var(--accent1)}
.proj-link{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.15em;color:var(--accent1);text-decoration:none;transition:color 0.3s;white-space:nowrap}
.proj-link:hover{color:var(--accent2)}

/* ================================================
   EXPERIENCE / TIMELINE
   ================================================ */
.experience{padding:160px 0}

/* ================================================

.research-conf{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.4em;color:var(--accent4);text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:12px}

/* Preset buttons */

/* Reset */

  text-transform:uppercase;color:var(--accent3);

  padding:10px;cursor:pointer;transition:all 0.3s;
}
.export-btn:hover{background:rgba(12,242,196,0.1);border-color:rgba(12,242,196,0.5)}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* =====================================================
   THEME PRESETS
   Each preset: name, accent colors (a1-a4), bg, grad pair, bar pair
   ===================================================== */
const PRESETS = [
  {
    id:'cosmic-gold', name:'Cosmic Gold',
    colors:['#E8B04B','#F5CB7A'],
    a1:'#E8B04B', a1lt:'#F5CB7A', a1r:'232,176,75',
    a2:'#FF4B6E', a2r:'255,75,110',
    a3:'#0CF2C4', a3r:'12,242,196',
    a4:'#9B6DFF', a4r:'155,109,255',
    bg:'#04060F', orb1:'232,176,75', orb2:'255,75,110', orb3:'12,242,196',
  },
  {
    id:'neon-ocean', name:'Neon Ocean',
    colors:['#00D4FF','#7B2FBE'],
    a1:'#00D4FF', a1lt:'#5AE8FF', a1r:'0,212,255',
    a2:'#7B2FBE', a2r:'123,47,190',
    a3:'#FF6B35', a3r:'255,107,53',
    a4:'#00FFB3', a4r:'0,255,179',
    bg:'#020B18', orb1:'0,212,255', orb2:'123,47,190', orb3:'0,255,179',
  },
  {
    id:'cherry-blossom', name:'Cherry Blossom',
    colors:['#FF6B9D','#FFB347'],
    a1:'#FF6B9D', a1lt:'#FF9DC0', a1r:'255,107,157',
    a2:'#FFB347', a2r:'255,179,71',
    a3:'#C77DFF', a3r:'199,125,255',
    a4:'#72EFDD', a4r:'114,239,221',
    bg:'#0D0810', orb1:'255,107,157', orb2:'255,179,71', orb3:'199,125,255',
  },
  {
    id:'toxic-lime', name:'Toxic Lime',
    colors:['#AAFF00','#00FFA3'],
    a1:'#AAFF00', a1lt:'#CCFF55', a1r:'170,255,0',
    a2:'#00FFA3', a2r:'0,255,163',
    a3:'#FF0066', a3r:'255,0,102',
    a4:'#FFD600', a4r:'255,214,0',
    bg:'#060A02', orb1:'170,255,0', orb2:'0,255,163', orb3:'255,0,102',
  },
  {
    id:'solar-flare', name:'Solar Flare',
    colors:['#FF6A00','#FFD200'],
    a1:'#FF6A00', a1lt:'#FF9C55', a1r:'255,106,0',
    a2:'#FFD200', a2r:'255,210,0',
    a3:'#FF1493', a3r:'255,20,147',
    a4:'#7FDBFF', a4r:'127,219,255',
    bg:'#0C0601', orb1:'255,106,0', orb2:'255,210,0', orb3:'255,20,147',
  },
  {
    id:'arctic-void', name:'Arctic Void',
    colors:['#A8DADC','#E8F4F8'],
    a1:'#A8DADC', a1lt:'#C8EEF0', a1r:'168,218,220',
    a2:'#E8F4F8', a2r:'232,244,248',
    a3:'#457B9D', a3r:'69,123,157',
    a4:'#6DAEDB', a4r:'109,174,219',
    bg:'#050C12', orb1:'168,218,220', orb2:'69,123,157', orb3:'109,174,219',
  },
];

/* =====================================================
   APPLY THEME to :root CSS vars
   ===================================================== */
function applyTheme(t) {
  const r = document.documentElement.style;
  r.setProperty('--accent1',     t.a1);
  r.setProperty('--accent1-lt',  t.a1lt);
  r.setProperty('--accent1-dim', `rgba(${t.a1r},0.13)`);
  r.setProperty('--accent1-glow',`0 0 48px rgba(${t.a1r},0.22)`);
  r.setProperty('--accent2',     t.a2);
  r.setProperty('--accent2-dim', `rgba(${t.a2r},0.11)`);
  r.setProperty('--accent2-glow',`0 0 48px rgba(${t.a2r},0.2)`);
  r.setProperty('--accent3',     t.a3);
  r.setProperty('--accent3-dim', `rgba(${t.a3r},0.1)`);
  r.setProperty('--accent3-glow',`0 0 48px rgba(${t.a3r},0.18)`);
  r.setProperty('--accent4',     t.a4);
  r.setProperty('--accent4-dim', `rgba(${t.a4r},0.12)`);
  r.setProperty('--accent4-glow',`0 0 40px rgba(${t.a4r},0.2)`);
  r.setProperty('--gold',        t.a1);
  r.setProperty('--gold-lt',     t.a1lt);
  r.setProperty('--gold-dim',    `rgba(${t.a1r},0.13)`);
  r.setProperty('--border-h',    `rgba(${t.a1r},0.45)`);
  r.setProperty('--cta-color',   t.a1);
  r.setProperty('--cta-hover',   `rgba(${t.a1r},0.13)`);
  r.setProperty('--grad-a',      t.a1);
  r.setProperty('--grad-b',      t.a2);
  r.setProperty('--bar-a',       t.a1);
  r.setProperty('--bar-b',       t.a2);
  r.setProperty('--prog-a',      t.a1);
  r.setProperty('--prog-b',      t.a2);
  r.setProperty('--prog-c',      t.a3);
  r.setProperty('--dot-color',   t.a1);
  r.setProperty('--orb1-color',  t.orb1||t.a1r);
  r.setProperty('--orb2-color',  t.orb2||t.a2r);
  r.setProperty('--orb3-color',  t.orb3||t.a3r);
  if (t.bg) r.setProperty('--bg', t.bg);
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex.replace('#','#'));
  if (!r) return '0,0,0';
  return `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`;
}

function exportCSS(custom) {
  const lines = [':root {'];
  lines.push(`  --accent1:     ${custom.a1};`);
  lines.push(`  --accent1-lt:  ${custom.a1lt};`);
  lines.push(`  --accent1-dim: rgba(${custom.a1r},0.13);`);
  lines.push(`  --accent2:     ${custom.a2};`);
  lines.push(`  --accent3:     ${custom.a3};`);
  lines.push(`  --accent4:     ${custom.a4};`);
  lines.push(`  --bg:          ${custom.bg};`);
  lines.push('}');
  const blob = new Blob([lines.join('\n')], {type:'text/css'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'vks-theme.css';
  a.click();
}

/* =====================================================
   THEME SWITCHER COMPONENT
   ===================================================== */
function ThemeSwitcher() {
  const [open, setOpen] = useState(false);
  const [activePreset, setActivePreset] = useState('cosmic-gold');
  const [custom, setCustom] = useState({...PRESETS[0]});

  const BG_OPTIONS = [
    '#04060F','#020B18','#0D0810','#060A02','#0C0601','#050C12',
    '#0A0A0A','#080012','#001A0D','#12000A',
  ];

  const pickPreset = (p) => {
    setActivePreset(p.id);
    setCustom({...p});
    applyTheme(p);
  };

  const updateColor = (key, val) => {
    const rgb = hexToRgb(val);
    const updated = {...custom, [key]: val, [`${key}r`]: rgb};
    if (key==='a1') { updated.a1lt = val; }
    setCustom(updated);
    applyTheme(updated);
    setActivePreset('custom');
  };

  const updateBg = (val) => {
    const updated = {...custom, bg: val};
    setCustom(updated);
    applyTheme(updated);
    setActivePreset('custom');
  };

  const reset = () => pickPreset(PRESETS[0]);

  const COLOR_FIELDS = [
    {key:'a1', label:'Primary accent'},
    {key:'a2', label:'Secondary accent'},
    {key:'a3', label:'Tertiary accent'},
    {key:'a4', label:'Quaternary accent'},
  ];

  return (
    <>
      <div className="theme-panel">
        <button className="theme-toggle-btn" onClick={()=>setOpen(o=>!o)}>
          {open ? '✕ Close' : '🎨 Theme'}
        </button>
      </div>

      <div className={`theme-drawer${open?'':' closed'}`}>
        <div className="drawer-title">
          <span>Theme Studio</span>
          <button className="drawer-close" onClick={()=>setOpen(false)}>✕</button>

function useScrollReveal() {
  useEffect(() => {
    const targets = document.querySelectorAll('.reveal,.reveal-left,.reveal-scale');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
    },{threshold:0.11});
    targets.forEach(t=>io.observe(t));
    return ()=>io.disconnect();
  },[]);
}

function useTypewriter(words) {
  const [text, setText] = useState('');
  const state = useRef({idx:0,char:0,del:false});
  useEffect(()=>{
    let timer;
    const tick=()=>{
      const {idx,char,del}=state.current;
      const word=words[idx];
      if(!del){
        const next=char+1; setText(word.slice(0,next)); state.current.char=next;
        if(next===word.length){state.current.del=true;timer=setTimeout(tick,2100);return;}
      } else {
        const next=char-1; setText(word.slice(0,next)); state.current.char=next;
        if(next===0){state.current.del=false;state.current.idx=(idx+1)%words.length;}
      }
      timer=setTimeout(tick,state.current.del?36:82);
    };
    timer=setTimeout(tick,1400);
    return()=>clearTimeout(timer);
  },[]);
  return text;
}

/* =====================================================
   PARTICLE CANVAS
   ===================================================== */
function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(()=>{
    const canvas=ref.current, ctx=canvas.getContext('2d');
    let W,H,pts=[],raf;
    const COLS=['232,176,75','255,75,110','12,242,196','155,109,255'];
    class Dot{
      constructor(){this.reset(true)}
      reset(full){
        if(full){this.x=Math.random()*W;this.y=Math.random()*H;}
        else{this.x=Math.random()*W;this.y=Math.random()<0.5?-5:H+5;}
        this.vx=(Math.random()-0.5)*0.28; this.vy=(Math.random()-0.5)*0.28;
        this.r=Math.random()*1.4+0.4; this.a=Math.random()*0.32+0.06;
        this.c=COLS[Math.floor(Math.random()*COLS.length)];
      }
      update(){this.x+=this.vx;this.y+=this.vy;if(this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.reset(false);}
      draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.c},${this.a})`;ctx.fill();}
    }
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
    function lines(){
      for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<88){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(232,176,75,${0.065*(1-d/88)})`;ctx.lineWidth=0.5;ctx.stroke();}
      }
    }
    function loop(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.update();p.draw();});lines();raf=requestAnimationFrame(loop);}
    resize(); window.addEventListener('resize',resize);
    for(let i=0;i<88;i++) pts.push(new Dot());
    loop();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} className="particle-canvas"/>;
}

/* =====================================================
   APP ROOT
   ===================================================== */
function App() {
  const [loaded,setLoaded]=useState(false);
  const [scrolled,setScrolled]=useState(false);
  const [progress,setProgress]=useState(0);
  useEffect(()=>{
    const onScroll=()=>{
      setScrolled(window.scrollY>60);
      const max=document.body.scrollHeight-window.innerHeight;
      setProgress(max>0?(window.scrollY/max)*100:0);
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    return()=>window.removeEventListener('scroll',onScroll);
  },[]);
  useScrollReveal();
  return(
    <>
      {!loaded&&<Loader onDone={()=>setLoaded(true)}/>}
      <div className="noise"/>
      <ParticleCanvas/>
      <ThemeSwitcher/>
      <Navbar scrolled={scrolled} progress={progress}/>
      <Hero/>
      <div className="divider"/>
      <About/>
      <div className="divider"/>
      <Skills/>
      <div className="divider"/>
      <Projects/>
      <div className="divider"/>
      <Experience/>
      <div className="divider"/>
      <Research/>
      <div className="divider"/>
      <Contact/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
